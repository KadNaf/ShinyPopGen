# .gitlab-ci.yml – Pipeline CI/CD shinypopgen
#
# Auto-provided by GitLab (no setup needed):
#   CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD
#
# Must be set in Settings → CI/CD → Variables (masked, protected):
#   FORGE_TOKEN  personal access token with api scope
#                (to push a branch and open a MR on skat3/apps)

stages:
  - build
  - deploy

# ── Stage 1: build and push to GitLab registry ──────────────────────────────
docker-build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
        --context "$CI_PROJECT_DIR"
        --dockerfile "$CI_PROJECT_DIR/Dockerfile"
        --destination "$IMAGE_TAG"
        --cache=true
        --cache-repo "$CI_REGISTRY_IMAGE/cache"
        --skip-tls-verify
        --snapshot-mode=redo
        --compression=zstd
        --compression-level=1
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - R/**/*
        - src/**/*
        - inst/**/*
        - DESCRIPTION
        - NAMESPACE
        - Dockerfile

# ── Stage 2: open a MR on skat3/apps to update the image tag ────────────────
open-mr:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
    - git config --global user.email "ci@forge.ird.fr"
    - git config --global user.name "CI shinypopgen"
  script:
    - test -n "$FORGE_TOKEN" || (echo "FORGE_TOKEN is not set" && exit 1)
    - BRANCH="ci/shinypopgen-${CI_COMMIT_SHORT_SHA}"
    - NEW_IMAGE="${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - APPS_URL="https://forge.ird.fr/api/v4/projects/mivegec%2Fdainat%2Fskat3%2Fapps"
    - git clone "https://oauth2:${FORGE_TOKEN}@forge.ird.fr/mivegec/dainat/skat3/apps.git" /tmp/skat3-apps
    - cd /tmp/skat3-apps
    - git checkout -b "${BRANCH}"
    - sed -i "s|registry.forge.ird.fr/intertryp/shinypopgen:.*|${NEW_IMAGE}|" rshiny-shinypopgen/deployment.yaml
    - git diff --quiet rshiny-shinypopgen/deployment.yaml && echo "no change needed" && exit 0 || true
    - git add rshiny-shinypopgen/deployment.yaml
    - git commit -m "chore(shinypopgen) deploy ${CI_COMMIT_SHORT_SHA}"
    - git push origin "${BRANCH}"
    - "MR_TOKEN=\"PRIVATE-TOKEN: ${FORGE_TOKEN}\""
    - "MR_CT=\"Content-Type: application/json\""
    - MR_DATA="{\"source_branch\":\"${BRANCH}\",\"target_branch\":\"main\",\"title\":\"chore(shinypopgen) deploy ${CI_COMMIT_SHORT_SHA}\",\"remove_source_branch\":true}"
    - curl --silent --fail --request POST --header "${MR_TOKEN}" --header "${MR_CT}" --data "${MR_DATA}" "${APPS_URL}/merge_requests"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
